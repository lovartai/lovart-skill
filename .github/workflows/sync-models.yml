name: Render READMEs from templates + live catalog

on:
  schedule:
    # Monday 01:00 UTC (09:00 CST)
    - cron: "0 1 * * 1"
  push:
    branches: [main]
    paths:
      - "templates/**"
      - "scripts/sync_models.py"
      - ".github/workflows/sync-models.yml"
  workflow_dispatch:
    inputs:
      catalog_url:
        description: "Override the catalog URL (default: prod)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-models
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render READMEs
        id: sync
        env:
          CATALOG_URL: ${{ github.event.inputs.catalog_url != '' && github.event.inputs.catalog_url || 'https://lgw.lovart.ai/v1/openapi/tools/catalog' }}
        run: |
          python3 scripts/sync_models.py
          if git diff --quiet -- README.md README_CN.md README_TW.md README_JA.md; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open / update PR
        if: steps.sync.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/sync-models
          base: main
          title: "chore: regenerate READMEs from templates + live catalog"
          commit-message: "chore: regenerate READMEs from templates + live catalog"
          body: |
            Auto-generated by `.github/workflows/sync-models.yml`.

            Triggered by:
            - template change (`templates/**`), or
            - weekly schedule (Mon 01:00 UTC), or
            - manual `workflow_dispatch`.

            Source of truth is `templates/*.md`; this PR only touches the
            rendered root READMEs. To change the human-written sections, edit
            the template files in `templates/`.
          delete-branch: true
          add-paths: |
            README.md
            README_CN.md
            README_TW.md
            README_JA.md
