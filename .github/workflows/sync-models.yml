name: Render READMEs from templates + live catalog

on:
  schedule:
    # 01:00 UTC daily (09:00 CST)
    - cron: "0 1 * * *"
  push:
    branches: [main]
    paths:
      - "templates/**"
      - "scripts/sync_models.py"
      - ".github/workflows/sync-models.yml"
  workflow_dispatch:
    inputs:
      catalog_url:
        description: "Override the catalog URL (default: prod)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-models
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render READMEs + SKILL.md
        id: sync
        env:
          CATALOG_URL: ${{ github.event.inputs.catalog_url != '' && github.event.inputs.catalog_url || 'https://lgw.lovart.ai/v1/openapi/tools/catalog' }}
        run: |
          python3 scripts/sync_models.py
          if git diff --quiet -- README.md README_CN.md README_TW.md README_JA.md skills/lovart-skill/SKILL.md; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit + push directly to main
        if: steps.sync.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md README_CN.md README_TW.md README_JA.md skills/lovart-skill/SKILL.md
          git commit -m "chore: regenerate model tables from live catalog [skip ci]"
          git push origin main
