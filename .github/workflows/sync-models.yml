name: Sync model tables from live catalog

on:
  schedule:
    # Monday 01:00 UTC (09:00 CST)
    - cron: "0 1 * * 1"
  workflow_dispatch:
    inputs:
      catalog_url:
        description: "Override the catalog URL (default: prod)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-models
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run sync script
        id: sync
        env:
          CATALOG_URL: ${{ github.event.inputs.catalog_url != '' && github.event.inputs.catalog_url || 'https://lgw.lovart.ai/v1/openapi/tools/catalog' }}
        run: |
          python3 scripts/sync_models.py | tee sync.log
          if git diff --quiet -- README.md README_CN.md README_TW.md README_JA.md; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open / update PR
        if: steps.sync.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/sync-models
          base: main
          title: "chore: sync model tables from live catalog"
          commit-message: "chore: sync model tables from live catalog"
          body: |
            Auto-regenerated by `.github/workflows/sync-models.yml` from the live
            `/v1/openapi/tools/catalog` endpoint. Re-run manually with the
            "Run workflow" button if the scheduled run has stale data.
          delete-branch: true
          add-paths: |
            README.md
            README_CN.md
            README_TW.md
            README_JA.md
