name: Publish to ClawHub

# Publishes the skill at skills/lovart-skill to clawhub.com via the
# `clawhub` CLI (bunx). Simpler than the reusable `package-publish.yml`
# route because skills don't need openclaw.bundle.json / package.json
# manifests — `clawhub publish <path>` reads SKILL.md frontmatter.
#
# Triggers:
#   - Tag push (v*)       → real publish (version derived from tag name)
#   - Pull request        → dry-run preview (no mutation)
#   - Manual dispatch     → user picks dry_run + version override
#
# Required repo secret: CLAWHUB_TOKEN (a clh_... token from clawhub.com).

on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - "skills/**"
      - "templates/**"
      - "scripts/sync_models.py"
      - ".github/workflows/publish-clawhub.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (preview only, no real publish)"
        type: boolean
        default: true
      version:
        description: "Override version (default: git tag without v prefix)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Resolve version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            V="${{ inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            V="${GITHUB_REF#refs/tags/v}"
          else
            V="0.0.0-preview"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $V"

      - name: Determine dry-run flag
        id: dry
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            echo "flag=--dry-run" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            echo "flag=--dry-run" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [[ -z "$CLAWHUB_TOKEN" ]]; then
            echo "::error::CLAWHUB_TOKEN secret is required"
            exit 1
          fi
          bunx clawhub login --token "$CLAWHUB_TOKEN"

      - name: Publish
        run: |
          bunx clawhub publish skills/lovart-skill \
            --slug lovart-admin/lovart-skill \
            --version "${{ steps.version.outputs.version }}" \
            --tags latest \
            ${{ steps.dry.outputs.flag }}
