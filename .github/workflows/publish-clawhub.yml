name: Publish to ClawHub

# Publishes the skill at skills/lovart-skill to clawhub.com via the
# `clawhub` CLI (bunx). The skill command has no --dry-run, so preview
# is done in a separate validate job that just parses SKILL.md frontmatter.
#
# Triggers:
#   - Tag push (v*)     → real publish (version = tag without `v` prefix)
#   - Pull request      → validate only (no publish)
#   - Manual dispatch   → real publish (version override optional)
#
# Required repo secret: CLAWHUB_TOKEN (a clh_... token from clawhub.com).

on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - "skills/**"
      - "templates/**"
      - "scripts/sync_models.py"
      - ".github/workflows/publish-clawhub.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (default: git tag without v prefix)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate SKILL.md frontmatter
        run: |
          python3 <<'PY'
          import yaml, sys
          text = open("skills/lovart-skill/SKILL.md").read()
          if not text.startswith("---"):
              sys.exit("SKILL.md missing YAML frontmatter")
          fm = text.split("---", 2)[1]
          data = yaml.safe_load(fm)
          required = ("name", "description")
          missing = [k for k in required if not data.get(k)]
          if missing:
              sys.exit(f"missing required frontmatter fields: {missing}")
          print(f"valid: name={data['name']!r}")
          PY

  publish:
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Resolve version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            V="${{ inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            V="${GITHUB_REF#refs/tags/v}"
          else
            echo "::error::Manual dispatch requires --version input (no git tag present)"
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $V"

      - name: Login to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [[ -z "$CLAWHUB_TOKEN" ]]; then
            echo "::error::CLAWHUB_TOKEN secret is required"
            exit 1
          fi
          bunx clawhub login --token "$CLAWHUB_TOKEN"

      - name: Publish
        run: |
          bunx clawhub publish skills/lovart-skill \
            --slug lovart-skill \
            --version "${{ steps.version.outputs.version }}" \
            --tags latest
